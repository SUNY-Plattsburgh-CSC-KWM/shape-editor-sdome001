<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shape Editor Website</title>
</head>

<body>

    <h3 id="message">Select a command</h3>

    <svg id="canvas" style="width:1000px; height:1000px; border:1px solid black;">

        <!-- commands -->
        <g id="createCmd">
            <rect x="20" y="20" width="100" height="40" fill="lightblue"></rect>
            <text x="40" y="45">Create</text>
        </g>

        <g id="moveCmd">
            <rect x="140" y="20" width="100" height="40" fill="lightgreen"></rect>
            <text x="170" y="45">Move</text>
        </g>

        <g id="deleteCmd">
            <rect x="260" y="20" width="100" height="40" fill="salmon"></rect>
            <text x="285" y="45">Delete</text>
        </g>

        <!-- the shape types -->
        <g id="rectType" visibility="hidden">
            <rect x="400" y="20" width="120" height="40" fill="gray"></rect>
            <text x="420" y="45">Rectangle</text>
        </g>

        <g id="circleType" visibility="hidden">
            <rect x="540" y="20" width="120" height="40" fill="gray"></rect>
            <text x="570" y="45">Circle</text>
        </g>

    </svg>

    <script>
        const svg = document.getElementById("canvas");
        const msg = document.getElementById("message");

        let state = "idle";
        let shapes = [];
        let shapeId = 0;
        let selectedShape = null;

        /* the message */
        function setMessage(text) {
            msg.textContent = text;
        }

        /* comand data*/
        const commands = [
            { name: "create", el: document.getElementById("createCmd") },
            { name: "move", el: document.getElementById("moveCmd") },
            { name: "delete", el: document.getElementById("deleteCmd") },
            { name: "rect", el: document.getElementById("rectType") },
            { name: "circle", el: document.getElementById("circleType") }
        ];

        /* mouse position */
        function getMouse(evt) {
            const rect = svg.getBoundingClientRect();
            return {
                x: evt.clientX - rect.left,
                y: evt.clientY - rect.top
            };
        }

        /* check command click */
        function getCommand(x, y) {
            for (let c of commands) {
                if (c.el.getAttribute("visibility") === "hidden") continue;

                let box = c.el.getBBox();
                if (x >= box.x && x <= box.x + box.width &&
                    y >= box.y && y <= box.y + box.height) {
                    return c.name;
                }
            }
            return null;
        }

        /* check shape click */
        function getShapeIndex(x, y) {
            for (let i = shapes.length - 1; i >= 0; i--) {
                let s = shapes[i];

                if (s.type === "rect") {
                    if (x >= s.x && x <= s.x + s.w &&
                        y >= s.y && y <= s.y + s.h) {
                        return i;
                    }
                }

                if (s.type === "circle") {
                    let dx = x - s.x;
                    let dy = y - s.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= s.r) {
                        return i;
                    }
                }
            }
            return -1;
        }

        /* creating rectangle */
        function createRect(x, y) {
            let r = document.createElementNS("http://www.w3.org/2000/svg", "rect");

            r.setAttribute("x", x);
            r.setAttribute("y", y);
            r.setAttribute("width", 80);
            r.setAttribute("height", 50);
            r.setAttribute("fill", "purple");

            let id = "id" + shapeId++;
            r.setAttribute("id", id);

            svg.appendChild(r);

            shapes.push({
                id,
                type: "rect",
                x, y,
                w: 80,
                h: 50,
                el: r
            });
        }

        /* creating cirles */
        function createCircle(x, y) {
            let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");

            c.setAttribute("cx", x);
            c.setAttribute("cy", y);
            c.setAttribute("r", 30);
            c.setAttribute("fill", "orange");

            let id = "id" + shapeId++;
            c.setAttribute("id", id);

            svg.appendChild(c);

            shapes.push({
                id,
                type: "circle",
                x, y,
                r: 30,
                el: c
            });
        }

        /* move shapes */
        function moveShape(s, x, y) {
            if (s.type === "rect") {
                s.x = x;
                s.y = y;
                s.el.setAttribute("x", x);
                s.el.setAttribute("y", y);
            }

            if (s.type === "circle") {
                s.x = x;
                s.y = y;
                s.el.setAttribute("cx", x);
                s.el.setAttribute("cy", y);
            }
        }

        /* delete shapes */
        function deleteShape(i) {
            svg.removeChild(shapes[i].el);
            shapes.splice(i, 1);
        }

        /* show or hide shape types */
        function showTypes(show) {
            document.getElementById("rectType")
                .setAttribute("visibility", show ? "visible" : "hidden");
            document.getElementById("circleType")
                .setAttribute("visibility", show ? "visible" : "hidden");
        }

        /* main dispatcherr */
        svg.addEventListener("mousedown", function (evt) {

            let { x, y } = getMouse(evt);
            let cmd = getCommand(x, y);

            switch (state) {

                case "idle":
                    if (cmd === "create") {
                        state = "choosingType";
                        showTypes(true);
                        setMessage("Select shape type");
                    }
                    else if (cmd === "move") {
                        state = "selectMove";
                        setMessage("Select shape to move");
                    }
                    else if (cmd === "delete") {
                        state = "selectDelete";
                        setMessage("Select shape to delete");
                    }
                    break;

                case "choosingType":
                    if (cmd === "rect") {
                        state = "creatingRect";
                        setMessage("Click on canvas to place rectangle");
                    }
                    else if (cmd === "circle") {
                        state = "creatingCircle";
                        setMessage("Click on canvas to place circle");
                    }
                    break;

                case "creatingRect":
                    createRect(x, y);
                    showTypes(false);
                    state = "idle";
                    setMessage("Rectangle created");
                    break;

                case "creatingCircle":
                    createCircle(x, y);
                    showTypes(false);
                    state = "idle";
                    setMessage("Circle created");
                    break;

                case "selectMove":
                    let i = getShapeIndex(x, y);
                    if (i !== -1) {
                        selectedShape = shapes[i];
                        state = "placing";
                        setMessage("Click new location");
                    }
                    break;

                case "placing":
                    moveShape(selectedShape, x, y);
                    state = "idle";
                    setMessage("Shape moved");
                    break;

                case "selectDelete":
                    let j = getShapeIndex(x, y);
                    if (j !== -1) {
                        deleteShape(j);
                        state = "idle";
                        setMessage("Shape deleted");
                    }
                    break;
            }

        });
    </script>

</body>
</html>
